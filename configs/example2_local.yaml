project_name: "MeerKAT-correlator-upgrade-imaging-tests"

# Where outputs go inside repo directory (created if missing)
paths:
  raw_dir: "data/raw"
  interim_dir: "data/interim"
  processed_dir: "data/processed"
  reports_dir: "data/reports"
  sky_xmatches_dir: "data/processed/Sky-CrossMatches"

# Reference dataset (e.g. CMC1 datasets -- delete/leave out inputs that won't be used)
reference:
  name: "Lband_ref"
  ms_paths:
    - "/ABS/PATH/TO/ref_refcorr.ms"
  images: # PB-corrected and/or uncorrected versions
    - "/Users/samuel/SARAO/imagin_varification/2025/images/source_find_images/data/reference_obs/images/1692135074_sdp_l0.full.SDP.Allcorrected.MFS.image.fits" # "/ABS/PATH/TO/ref_image_mfs.fits"
    - "/Users/samuel/SARAO/imagin_varification/2025/data/images/1757723806_continuum_image_J2147-8132_IClean.lowband.fits" # "/ABS/PATH/TO/ref_image_lowband.fits"
    - "/Users/samuel/SARAO/imagin_varification/2025/data/images/1757723806_continuum_image_J2147-8132_IClean.hghband.fits" # "/ABS/PATH/TO/ref_image_highband.fits"

# One or more test datasets (e.g. CMC2 datasets -- delete/leave out inputs that won't be used)
tests:
  - name: "Lband_1757723806" # CMC2/test dataset name (human readable)
    ms_paths:
      - "/ABS/PATH/TO/Lband_1757723806.SDPAllcorrected.ms"
    images: # PB-corrected and/or uncorrected versions
      - "/Users/samuel/SARAO/imagin_varification/2025/data/1757723806_sdp_l0.full.SDP_Allcorrected.MFS.image.fits" # "/ABS/PATH/TO/Lband_1757723806.SDPAllcorrected.MFS.fits"
      - "/Users/samuel/SARAO/imagin_varification/2025/data/images/1757723806_continuum_image_J2147-8132_IClean.lowband.fits" # "/ABS/PATH/TO/Lband_1757723806_lowband.fits"
      - "/Users/samuel/SARAO/imagin_varification/2025/data/images/1757723806_continuum_image_J2147-8132_IClean.hghband.fits" # "/ABS/PATH/TO/Lband_1757723806_highband.fits"

# CASA settings
casa:
  scans: "3,5,7,9"              # scan ID numbers, e.g. "1,2,5" to constrain per-scan imaging
  lowband_hz: [8.98e8, 1.00e9]  # L-band lowband frequency range (otherwise lower quartile of band)
  highband_hz: [1.46e9, 1.70e9] # L-band highband frequency range (otherwise upper quartile of band)

# PyBDSF defaults
pybdsf:
  thresh_isl: 3.5
  thresh_pix: 5.0
  freq_mhz: 1284           # used if input FITS lacks freq (common for tclea & exportfits images)

# Cross-match defaults
xmatch:
  max_sep_arcsec: 1.0
  ra_col_1: "RA"
  dec_col_1: "DEC"
  ra_col_2: "RA"
  dec_col_2: "DEC"
  coord_frame: "icrs"
  one_to_many: false

# Extra step-specific wiring
extra:
  # For step 3 ("step3_calibrate_image.py"): only run standalone calibration if explicitly requested
  force_calibrate: false

  # For step 5 ("step5_srcfind.py"): you can add additional globs to process (e.g. per-scan mfs or subband images)
  images_globs: []

  # For step 6 ("step6_xmatch.py"): list pairs to cross-match (output auto-placed if omitted)
  xmatch_pairs:
    - ["/ABS/PATH/TO/ref_lowband_catalog.fits", "/ABS/PATH/TO/Lband_1757723806_lowband_catalog.fits"]
    - ["/ABS/PATH/TO/ref_highband_catalog.fits", "/ABS/PATH/TO/Lband_1757723806_highband_catalog.fits"]
    - ["/ABS/PATH/TO/ref_mfs_catalog.fits", "/ABS/PATH/TO/Lband_1757723806.SDPAllcorrected.MFS_catalog.fits"]

  # For step 7a ("step7_positions.py"): positions analyses 
  # (note that each test set of inputs must be listed with the corresponding reference dataset, e.g. lowband test vs lowband reference etc.)
  positions:
    - xmatch_table: "/Users/samuel/SARAO/imagin_varification/2025/Sky-CrossMatches/refL_mfs_1757723806.SDPAllcorrected.MFS.fits" #
      ref_fits: "/Users/samuel/SARAO/imagin_varification/2025/images/source_find_images/data/reference_obs/images/1692135074_sdp_l0.full.SDP.Allcorrected.MFS.image.fits"
      other_fits: "/Users/samuel/SARAO/imagin_varification/2025/data/1757723806_sdp_l0.full.SDP_Allcorrected.MFS.image.fits"
      per_scan_glob: "/Users/samuel/SARAO/imagin_varification/2025/Sky-CrossMatches/refL_mfs_1757723806_scan*.fits" # (optional) per-scan mfs xmatches also work here
      otherdatatag: "Lband1757723806_mfs" # human readable reference for test observation used in plots/reports

  # For step 7b ("step7_flux.py"): flux analysis inputs
  flux:
    ref_low_xmatch:  "/Users/samuel/SARAO/imagin_varification/2025/Sky-CrossMatches/Lband_ref_lowband_Lband_1757723806_lowband.fits" # "/ABS/PATH/TO/ref_lowband_X_L1757723806_lowband.fits"
    ref_high_xmatch: "/Users/samuel/SARAO/imagin_varification/2025/Sky-CrossMatches/Lband_ref_highband_Lband_1757723806_highband.fits" # "/ABS/PATH/TO/ref_highband_X_L1757723806_highband.fits"
    ref_mfs_xmatch:  "/Users/samuel/SARAO/imagin_varification/2025/Sky-CrossMatches/refL_mfs_1757723806.SDPAllcorrected.MFS.fits" # "/ABS/PATH/TO/ref_mfs_X_L1757723806_mfs.fits"
    scans_glob:      "/Users/samuel/SARAO/imagin_varification/2025/Sky-CrossMatches/refL_mfs_1757723806_scan*.fits" # "/ABS/PATH/TO/ref_mfs_X_L1757723806_scan*.fits"
    docx_name:       "Lband1757723806_flux_summary.docx"
